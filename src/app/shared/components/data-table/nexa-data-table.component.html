<div class="table-container nexa-card">
  
  @if (loading) {
    <div class="loading-overlay">
      <mat-spinner diameter="40"></mat-spinner>
    </div>
  }

  <table mat-table [dataSource]="data" class="nexa-table">
    
    @for (col of columns; track col.key) {
      <ng-container [matColumnDef]="col.key">
        <th mat-header-cell *matHeaderCellDef [class.hide-mobile]="col.hideOnMobile">{{ col.label }}</th>
        <td mat-cell *matCellDef="let row" [class.hide-mobile]="col.hideOnMobile">
          <!-- Check if there is a custom cell template provided by the parent -->
          @if (getCustomTemplate(col.key); as template) {
            <ng-container *ngTemplateOutlet="template; context: { $implicit: row }"></ng-container>
          } @else {
            <!-- Default string rendering -->
            {{ row[col.key] || '—' }}
          }
        </td>
      </ng-container>
    }

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="table-row"></tr>
  </table>

  @if (data.length === 0 && !loading) {
    <div class="empty-state">
      <mat-icon>{{ emptyIcon }}</mat-icon>
      <p>{{ emptyMessage }}</p>
      @if (emptyActionLabel) {
        <button mat-stroked-button color="primary" (click)="onEmptyAction()">{{ emptyActionLabel }}</button>
      }
    </div>
  }

  <mat-paginator 
    [length]="totalRecords" 
    [pageSize]="pageSize" 
    [pageIndex]="pageIndex"
    [pageSizeOptions]="pageSizeOptions" 
    (page)="onPage($event)" 
    showFirstLastButtons>
  </mat-paginator>
</div>
