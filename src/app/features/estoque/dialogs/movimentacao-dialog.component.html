<h2 mat-dialog-title class="dialog-title">
  <mat-icon>swap_vert</mat-icon> Ajuste de Estoque
</h2>
<mat-dialog-content>
  <form [formGroup]="form" class="tab-content" style="width: 100%; min-width: 0;">
    @if (data.produtoNome) {
      <div class="product-info-badge">
        <mat-icon>inventory_2</mat-icon>
        <span>{{ data.produtoNome }}</span>
      </div>
    }
    <mat-form-field appearance="outline" class="full-width" *ngIf="!data.produtoId">
      <mat-label>ID do Produto</mat-label>
      <input matInput type="number" formControlName="produtoId" />
    </mat-form-field>
    <nexa-select label="Tipo" class="full-width" formControlName="tipo">
        <mat-option value="ENTRADA">Entrada</mat-option>
        <mat-option value="SAIDA">Saída</mat-option>
        <mat-option value="AJUSTE">Ajuste (definir valor absoluto)</mat-option>
      </nexa-select>
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Quantidade</mat-label>
      <input matInput type="number" formControlName="quantidade" min="1" />
    </mat-form-field>
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Motivo</mat-label>
      <textarea matInput formControlName="motivo" rows="2" placeholder="Ex: Contagem física..."></textarea>
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Cancelar</button>
  <button mat-flat-button color="primary" [disabled]="form.invalid" (click)="onSave()">Confirmar</button>
</mat-dialog-actions>
