<h2 mat-dialog-title>
  <mat-icon>check_circle</mat-icon>
  Confirmar Baixa
</h2>

<mat-dialog-content>
  <div class="baixa-info">
    <div class="baixa-info-row">
      <span class="info-label">Descrição</span>
      <span class="info-value">{{ data.titulo.descricao }}</span>
    </div>
    <div class="baixa-info-row">
      <span class="info-label">Vencimento</span>
      <span class="info-value">{{ data.titulo.dataVencimento | date:'dd/MM/yyyy' }}</span>
    </div>
    <div class="baixa-info-row destaque">
      <span class="info-label">Valor do Título</span>
      <span class="info-value valor">R$ {{ data.titulo.valor | number:'1.2-2' }}</span>
    </div>
  </div>

  <form [formGroup]="form">
    <div class="form-row">
      <mat-form-field appearance="outline" class="flex-1">
        <mat-label>Valor Pago (R$)</mat-label>
        <input matInput formControlName="valorPago" type="number" step="0.01" min="0.01" />
        <mat-icon matPrefix>attach_money</mat-icon>
      </mat-form-field>
      <mat-form-field appearance="outline" class="flex-1">
        <mat-label>Data do Pagamento</mat-label>
        <input matInput formControlName="dataPagamento" type="date" />
        <mat-icon matPrefix>event</mat-icon>
      </mat-form-field>
    </div>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Cancelar</button>
  <button mat-flat-button color="primary" (click)="onConfirm()" [disabled]="!form.valid">
    <mat-icon>check</mat-icon> Confirmar Baixa
  </button>
</mat-dialog-actions>
